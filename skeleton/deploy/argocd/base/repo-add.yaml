---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/part-of: argocd
    argocd.argoproj.io/secret-type: repository
  name: argocd-repo-${{ values.destination.owner }}-${{ values.destination.repo }}
stringData:
  name: ${{ values.destination.owner }}-${{ values.destination.repo }}
  url: https://github.com/${{ values.destination.owner }}/${{ values.destination.repo }}.git
